<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Goal 3 — Term 2 Mock Exams</title>
<!-- v2: all units mixed in every exam -->
<style>
:root{
  --green:#0e6b48; --green-dark:#0a4f35; --green-light:#e6f4ee;
  --gold:#c9a227; --ink:#1f2937; --muted:#6b7280; --bg:#f3f6f4;
  --ok:#15803d; --ok-bg:#dcfce7; --bad:#b91c1c; --bad-bg:#fee2e2;
  --card:#ffffff; --radius:14px;
}
*{box-sizing:border-box; margin:0; padding:0;}
body{font-family:"Segoe UI",Tahoma,Arial,sans-serif; background:var(--bg); color:var(--ink); line-height:1.55;}
.wrap{max-width:880px; margin:0 auto; padding:18px 14px 80px;}

/* ===== Header ===== */
.moe{background:linear-gradient(135deg,var(--green-dark),var(--green)); color:#fff; border-radius:var(--radius); padding:22px 24px; box-shadow:0 8px 24px rgba(14,107,72,.25); position:relative; overflow:hidden;}
.moe::after{content:""; position:absolute; right:-40px; top:-40px; width:200px; height:200px; border-radius:50%; background:rgba(255,255,255,.06);}
.moe-row{display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap; font-size:.85rem; opacity:.95;}
.moe-row div{line-height:1.7;}
.moe h1{text-align:center; font-size:1.35rem; margin:14px 0 4px; letter-spacing:.3px;}
.moe .sub{text-align:center; font-size:.9rem; opacity:.9;}
.moe .badge{display:inline-block; background:var(--gold); color:#3a2e05; font-weight:700; border-radius:999px; padding:2px 14px; font-size:.8rem; margin-top:10px;}
.student{display:flex; gap:10px; flex-wrap:wrap; margin-top:16px;}
.student input{flex:1; min-width:160px; border:none; border-radius:8px; padding:9px 12px; font-size:.9rem;}

/* ===== Tabs ===== */
.tabs{display:flex; gap:8px; margin:18px 0 6px; flex-wrap:wrap;}
.tab{flex:1; min-width:120px; background:var(--card); border:2px solid transparent; border-radius:12px; padding:10px 8px; text-align:center; cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,.06); transition:.15s;}
.tab:hover{transform:translateY(-2px);}
.tab.active{border-color:var(--green); background:var(--green-light);}
.tab b{display:block; color:var(--green-dark); font-size:.95rem;}
.tab span{font-size:.72rem; color:var(--muted);}
.tab .done{display:inline-block; margin-top:3px; font-size:.72rem; font-weight:700; color:var(--ok);}

/* ===== Sections ===== */
.section{background:var(--card); border-radius:var(--radius); box-shadow:0 2px 10px rgba(0,0,0,.05); margin-top:16px; overflow:hidden;}
.sec-head{display:flex; justify-content:space-between; align-items:center; padding:12px 18px; background:var(--green-light); border-bottom:1px solid #d4e9df;}
.sec-head h2{font-size:1rem; color:var(--green-dark);}
.sec-head h2 small{display:block; font-size:.74rem; color:var(--muted); font-weight:400;}
.marks{background:var(--green); color:#fff; border-radius:999px; padding:3px 12px; font-size:.78rem; font-weight:700; white-space:nowrap;}
.sec-body{padding:16px 18px;}
.instr{font-size:.85rem; color:var(--muted); font-style:italic; margin-bottom:12px;}

/* ===== Questions ===== */
.q{margin-bottom:14px; padding:12px 14px; border:1px solid #e5e7eb; border-radius:10px; transition:.2s;}
.q .qt{font-weight:600; margin-bottom:8px; font-size:.94rem;}
.q .qt .num{color:var(--green); margin-right:6px;}
.opts{display:flex; flex-wrap:wrap; gap:8px;}
.opt{position:relative;}
.opt input{position:absolute; opacity:0; pointer-events:none;}
.opt label{display:inline-block; border:1.5px solid #d1d5db; border-radius:999px; padding:6px 16px; cursor:pointer; font-size:.88rem; background:#fff; transition:.12s; user-select:none;}
.opt label:hover{border-color:var(--green);}
.opt input:checked + label{background:var(--green); color:#fff; border-color:var(--green);}
.q.correct{border-color:var(--ok); background:var(--ok-bg);}
.q.wrong{border-color:var(--bad); background:var(--bad-bg);}
.q .fb{display:none; margin-top:8px; font-size:.84rem; font-weight:600; border-radius:8px; padding:7px 12px;}
.q.correct .fb{display:block; color:var(--ok); background:#fff;}
.q.wrong .fb{display:block; color:var(--bad); background:#fff;}
.q.unanswered{border-color:var(--gold);}
.q.unanswered .fb{display:block; color:#92600a; background:#fff8e1;}

/* reading passage */
.passage{background:#fbfdf9; border:1px solid #dcebe2; border-left:5px solid var(--green); border-radius:10px; padding:16px 18px; margin-bottom:16px; font-size:.93rem;}
.passage h3{color:var(--green-dark); margin-bottom:8px; font-size:1.05rem;}
.passage p{margin-bottom:8px; text-align:justify;}

/* composition */
.comp-helpers{display:flex; flex-wrap:wrap; gap:6px; margin:10px 0 12px;}
.comp-helpers span{background:var(--green-light); color:var(--green-dark); border:1px dashed var(--green); border-radius:999px; padding:3px 12px; font-size:.8rem;}
textarea{width:100%; min-height:160px; border:1.5px solid #d1d5db; border-radius:10px; padding:12px; font-size:.95rem; font-family:inherit; resize:vertical;}
textarea:focus{outline:none; border-color:var(--green);}
.wordcount{font-size:.78rem; color:var(--muted); text-align:right; margin-top:4px;}
.model{display:none; margin-top:12px; background:#fffbea; border:1px solid #f0dc9a; border-radius:10px; padding:14px;}
.model h4{color:#8a6d0b; font-size:.9rem; margin-bottom:6px;}
.model p{font-size:.9rem;}
.rubric{display:none; margin-top:10px; font-size:.84rem;}
.rubric table{width:100%; border-collapse:collapse;}
.rubric td,.rubric th{border:1px solid #e5e7eb; padding:6px 10px; text-align:left;}
.rubric th{background:var(--green-light); color:var(--green-dark);}

/* buttons + score */
.actions{display:flex; gap:10px; margin-top:18px; flex-wrap:wrap;}
.btn{border:none; border-radius:10px; padding:12px 22px; font-size:.95rem; font-weight:700; cursor:pointer; transition:.15s;}
.btn:hover{transform:translateY(-1px);}
.btn-check{background:var(--green); color:#fff; flex:1; min-width:180px; box-shadow:0 4px 12px rgba(14,107,72,.3);}
.btn-reset{background:#fff; color:var(--muted); border:1.5px solid #d1d5db;}
.btn-print{background:#fff; color:var(--green-dark); border:1.5px solid var(--green);}
.score{display:none; margin-top:16px; background:var(--card); border-radius:var(--radius); box-shadow:0 2px 10px rgba(0,0,0,.05); padding:18px;}
.score h3{color:var(--green-dark); margin-bottom:10px;}
.score-total{font-size:1.5rem; font-weight:800; color:var(--green);}
.bar{height:12px; background:#e5e7eb; border-radius:999px; overflow:hidden; margin:10px 0 14px;}
.bar i{display:block; height:100%; background:linear-gradient(90deg,var(--green),var(--gold)); border-radius:999px; transition:width .6s;}
.score-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:8px;}
.score-grid div{background:var(--green-light); border-radius:10px; padding:8px 12px; font-size:.85rem;}
.score-grid b{display:block; color:var(--green-dark); font-size:1.05rem;}
.score .msg{margin-top:12px; font-size:.92rem; font-weight:600;}
.note-comp{font-size:.8rem; color:var(--muted); margin-top:8px;}

.fs-btn{position:fixed; top:14px; right:14px; z-index:99; background:var(--green-dark); color:#fff; border:none; border-radius:999px; padding:10px 18px; font-size:.85rem; font-weight:700; cursor:pointer; box-shadow:0 4px 14px rgba(0,0,0,.3); display:flex; align-items:center; gap:6px;}
.fs-btn:hover{background:var(--green);}
@media print{
  body{background:#fff;}
  .tabs,.actions,.moe .badge,.student,.fs-btn{display:none!important;}
  .section{box-shadow:none; border:1px solid #ccc; break-inside:avoid;}
  .q{break-inside:avoid;}
}
</style>
</head>

/* ---------- deterministic shuffle (stable across reloads) ---------- */
function shuffled(arr, seed){
  const a=arr.slice();
  let s=seed;
  for(let i=a.length-1;i>0;i--){
    s=(s*9301+49297)%233280;
    const j=Math.floor((s/233280)*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

}

function qHTML(item, group, idx, seed){
  const opts = item.tf ? ["True","False"] : shuffled(item.o, seed+idx*7+3);
  const correct=item.o[0];
  const name=`${group}_${idx}`;
  const saved=answers[current][name];
  return `<div class="q" id="q_${name}" data-correct="${escapeAttr(correct)}">
    <div class="qt"><span class="num">${idx+1}.</span>${item.q}</div>
    <div class="opts">${opts.map((o,k)=>`
      <span class="opt">
        <input type="radio" id="${name}_${k}" name="${name}" value="${escapeAttr(o)}" ${saved===o?'checked':''} onchange="answers[${current}]['${name}']=this.value">
        <label for="${name}_${k}">${o}</label>
      </span>`).join('')}
    </div>
    <div class="fb"></div>
  </div>`;
}

function spHTML(opts, idx, seed){
  const correct=opts[0];
  const mixed=shuffled(opts, seed+idx*13+5);
  const name=`sp_${idx}`;
  const saved=answers[current][name];
  return `<div class="q" id="q_${name}" data-correct="${escapeAttr(correct)}">
    <div class="qt"><span class="num">${idx+1}.</span>Choose the correct spelling:</div>
    <div class="opts">${mixed.map((o,k)=>`
      <span class="opt">
        <input type="radio" id="${name}_${k}" name="${name}" value="${escapeAttr(o)}" ${saved===o?'checked':''} onchange="answers[${current}]['${name}']=this.value">
        <label for="${name}_${k}">${o}</label>
      </span>`).join('')}
    </div>
    <div class="fb"></div>
  </div>`;
}

function escapeAttr(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

function updateWC(){
  const ta=document.getElementById('compText');
  if(!ta) return;
  answers[current].comp=ta.value;
  const n=ta.value.trim()? ta.value.trim().split(/\s+/).length : 0;
  document.getElementById('wc').textContent=n+" words";

function gradeGroup(prefix,count,per){
  let pts=0, right=0;
  for(let i=0;i<count;i++){
    const name=`${prefix}_${i}`;
    const div=document.getElementById('q_'+name);
    const correct=div.dataset.correct;
    const sel=document.querySelector(`input[name="${name}"]:checked`);
    div.classList.remove('correct','wrong','unanswered');
    const fb=div.querySelector('.fb');
    if(!sel){
      div.classList.add('unanswered');
      fb.textContent='⚠ Not answered. Correct answer: '+correct;
    }else if(sel.value===correct){
      div.classList.add('correct'); fb.textContent='✓ Correct!';
      pts+=per; right++;
    }else{
      div.classList.add('wrong');
      fb.textContent='✗ Incorrect. Correct answer: '+correct;
    }
  }
  return {pts, right};
}
